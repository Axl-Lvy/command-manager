name: Deploy Dev

on:
  push:
    branches: [dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/axl-lvy/command-manager:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.yml,monitoring/"
          target: /opt/command-manager-dev/

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DB_PASSWORD,DB_ROOT_PASSWORD
          script: |
            cd /opt/command-manager-dev
            echo "DB_PASSWORD=$DB_PASSWORD" > .env
            echo "DB_ROOT_PASSWORD=$DB_ROOT_PASSWORD" >> .env
            echo "DOCKER_SPRING_PROFILES_ACTIVE=dev" >> .env
            echo "APP_HOST_PORT=8081" >> .env
            echo "SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop" >> .env
            chmod 600 .env
            docker compose pull
            docker compose up -d
            docker image prune -f
