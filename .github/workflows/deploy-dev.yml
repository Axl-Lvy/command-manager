name: Deploy Dev

on:
  push:
    branches: [dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/axl-lvy/command-manager:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DB_PASSWORD,DB_ROOT_PASSWORD
          script: |
            cd /opt/command-manager-dev
            echo "DB_PASSWORD=$DB_PASSWORD" > .env
            echo "DB_ROOT_PASSWORD=$DB_ROOT_PASSWORD" >> .env
            chmod 600 .env
            grep -q "SPRING_PROFILES_ACTIVE" docker-compose.yml || sed -i '/SPRING_DATASOURCE_PASSWORD/a\      SPRING_PROFILES_ACTIVE: seed' docker-compose.yml
            docker compose pull
            docker compose up -d
            docker image prune -f
