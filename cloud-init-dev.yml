#cloud-config
packages:
  - docker.io

runcmd:
  - systemctl enable docker
  - systemctl start docker

  - mkdir -p /opt/command-manager-dev

  - |
    cat > /opt/command-manager-dev/.env << 'EOF'
    DB_PASSWORD=choose_a_strong_password
    DB_ROOT_PASSWORD=choose_another_strong_password
    EOF

  - chmod 600 /opt/command-manager-dev/.env

  - |
    cat > /opt/command-manager-dev/docker-compose.yml << 'EOF'
    services:
      app:
        image: ghcr.io/axl-lvy/command-manager:dev
        ports:
          - "8081:8080"
        environment:
          SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/command_manager_dev
          SPRING_DATASOURCE_USERNAME: app
          SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
        depends_on:
          db:
            condition: service_healthy
        restart: unless-stopped

      db:
        image: mysql:8
        environment:
          MYSQL_DATABASE: command_manager_dev
          MYSQL_USER: app
          MYSQL_PASSWORD: ${DB_PASSWORD}
          MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        volumes:
          - mysql_data:/var/lib/mysql
        healthcheck:
          test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
          interval: 10s
          timeout: 5s
          retries: 10
        restart: unless-stopped

    volumes:
      mysql_data:
    EOF
