vaadin.launch-browser=false
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.file.path=/app/logs
logging.max-history=7

# JSON encoding is configured directly in logback-spring.xml via StructuredLogEncoder.
# The logging.structured.format.* properties only apply to Spring Boot's auto-configured
# appenders, not to a custom logback-spring.xml, so they are intentionally omitted here.
