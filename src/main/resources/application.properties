server.port=${PORT:8080}

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/flow/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,fr.axl.lvy

# Database - defaults for development, overridden by application-local.properties
spring.datasource.url=jdbc:mysql://localhost:3306/command_manager
spring.datasource.username=root
spring.datasource.password=
# Development: Hibernate manages schema. Switch to validate + Flyway before production.
spring.jpa.hibernate.ddl-auto=update

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# Hibernate query statistics (auto-exposed via Micrometer)
spring.jpa.properties.hibernate.generate_statistics=true

# Activate local profile for credentials
spring.profiles.active=local
