<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11pt;
      color: #333333;
      margin: 0;
      padding: 0;
    }

    p { margin: 0; padding: 0; }

    .header-table { width: 100%; margin-bottom: 32pt; }
    .logo-cell { width: 58%; vertical-align: top; }
    .logo-cell img { height: 80pt; max-width: 180pt; }
    .addr-cell { width: 42%; vertical-align: top; font-size: 10pt; }
    .addr-cell .company-name { font-size: 12pt; font-weight: bold; margin-bottom: 4pt; }

    .parties-table { width: 100%; margin-bottom: 24pt; }
    .delivery-cell { width: 58%; vertical-align: top; }
    .client-cell { width: 42%; vertical-align: top; font-size: 10pt; }
    .client-cell .client-name { font-size: 11pt; font-weight: bold; margin-bottom: 4pt; }

    .order-title { color: #E07028; font-size: 24pt; font-weight: bold; margin-bottom: 16pt; }

    .meta-table { margin-bottom: 20pt; }
    .meta-label { color: #E07028; font-size: 9pt; font-weight: bold; padding-bottom: 2pt; }
    .meta-value { font-size: 11pt; }
    .meta-spacer { width: 40pt; }

    .lines-table { width: 100%; border-collapse: collapse; margin-bottom: 12pt; }
    .lines-table thead .double-rule th {
      border-top: 2pt solid #333333;
      border-bottom: 1pt solid #333333;
      height: 3pt;
      line-height: 3pt;
      padding: 0;
    }
    .lines-table thead tr { border-bottom: 2pt solid #333333; }
    .lines-table thead th {
      padding: 6pt 8pt;
      font-size: 9pt;
      font-weight: bold;
      text-align: left;
    }
    .lines-table thead th.right { text-align: right; }
    .lines-table tbody tr { border-bottom: 1pt solid #dddddd; }
    .lines-table tbody td { padding: 6pt 8pt; font-size: 10pt; }
    .lines-table tbody td.right { text-align: right; }
    .product-sub { font-size: 9pt; color: #666666; margin-top: 3pt; }

    .totals-table { width: 240pt; border-collapse: collapse; }
    .totals-table td { padding: 4pt 4pt; font-size: 10pt; }
    .totals-table .label { padding-right: 14pt; }
    .totals-table .amount { text-align: right; }
    .totals-table .final-row td {
      color: #E07028;
      font-weight: bold;
      font-size: 12pt;
      border-top: 2pt solid #333333;
    }

    .note-block { margin-top: 16pt; font-size: 10pt; color: #444444; }
    .incoterm-note { font-weight: bold; margin-bottom: 4pt; }
    .note-line { margin-bottom: 3pt; }
    .footer-block {
      padding-top: 8pt;
      border-top: 1pt solid #333333;
      font-size: 8.5pt;
      line-height: 1.35;
      text-align: center;
      position: running(footer);
    }

    @page {
      margin: 18mm 18mm 24mm 18mm;
      @bottom-center { content: element(footer); }
    }
  </style>
</head>
<body>

  <table class="header-table" cellspacing="0" cellpadding="0">
    <tr>
      <td class="logo-cell">
        <img th:if="${logoSrc != null}" th:src="${logoSrc}" alt=""/>
      </td>
      <td class="addr-cell" th:if="${ownCompany != null}">
        <p class="company-name" th:text="${ownCompany.name}"></p>
        <p th:each="line : ${ownCompanyAddressLines}" th:text="${line}"></p>
        <p th:if="${ownCompany.vatNumber != null}" th:text="${'TVA: ' + ownCompany.vatNumber}"></p>
      </td>
    </tr>
  </table>

  <table class="parties-table" cellspacing="0" cellpadding="0">
    <tr>
      <td class="delivery-cell">
        <p><strong>DELIVERY ADDRESS:</strong></p>
        <p th:each="line : ${deliveryLocationLines}" th:text="${line}"></p>
      </td>
      <td class="client-cell" th:if="${client != null}">
        <p class="client-name" th:text="${client.name}"></p>
        <p th:each="line : ${clientAddressLines}" th:text="${line}"></p>
      </td>
    </tr>
  </table>

  <p class="order-title" th:text="'Purchase Order #' + ${order.orderNumber}"></p>

  <table class="meta-table" cellspacing="0" cellpadding="0">
    <tr>
      <td style="vertical-align: top;">
        <p class="meta-label">Your order ref.:</p>
        <p class="meta-value" th:text="${yourOrderRef}"></p>
      </td>
      <td class="meta-spacer"></td>
      <td style="vertical-align: top;">
        <p class="meta-label">Order Date:</p>
        <p class="meta-value"
           th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy') : ''}"></p>
      </td>
      <td class="meta-spacer"></td>
      <td style="vertical-align: top;" th:if="${order.incoterms != null}">
        <p class="meta-label">Incoterm:</p>
        <p class="meta-value" th:text="${order.incoterms}"></p>
        <p class="meta-value" th:text="${order.incotermLocation != null ? order.incotermLocation : ''}"></p>
      </td>
    </tr>
  </table>

  <table class="lines-table">
    <thead>
      <tr class="double-rule">
        <th colspan="6"></th>
      </tr>
      <tr>
        <th style="width: 34%;">DESCRIPTION</th>
        <th style="width: 16%;">DATE REQ.</th>
        <th class="right" style="width: 16%;">QTY</th>
        <th class="right" style="width: 13%;">UNIT PRICE</th>
        <th style="width: 8%;">TAXES</th>
        <th class="right" style="width: 13%;">AMOUNT</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="line : ${lines}">
        <td>
          <p th:text="${line.displayName}"></p>
          <p class="product-sub" th:if="${line.shortDescription != null}" th:text="${line.shortDescription}"></p>
        </td>
        <td th:text="${order.expectedDeliveryDate != null ? #temporals.format(order.expectedDeliveryDate, 'dd/MM/yyyy') : ''}"></td>
        <td class="right"
            th:text="${#numbers.formatDecimal(line.quantity, 1, 'WHITESPACE', 2, 'COMMA')
                       + (line.unit != null ? ' ' + line.unit : '')}"></td>
        <td class="right"
            th:text="${#numbers.formatDecimal(line.unitPriceExclTax, 1, 'NONE', 2, 'COMMA')}"></td>
        <td th:text="${line.vatRate.signum() != 0 ? #numbers.formatDecimal(line.vatRate, 1, 'NONE', 0, 'COMMA') + '%' : ''}"></td>
        <td class="right"
            th:text="${currencySymbol + ' ' + #numbers.formatDecimal(line.lineTotalExclTax, 1, 'WHITESPACE', 2, 'COMMA')}"></td>
      </tr>
    </tbody>
  </table>

  <table class="totals-table" style="margin-left: auto; margin-right: 0;">
    <tr>
      <td class="label">Untaxed amount</td>
      <td class="amount"
          th:text="${currencySymbol + ' ' + #numbers.formatDecimal(order.totalExclTax, 1, 'WHITESPACE', 2, 'COMMA')}"></td>
    </tr>
    <tr class="final-row">
      <td class="label">Total</td>
      <td class="amount"
          th:text="${currencySymbol + ' ' + #numbers.formatDecimal(order.totalInclTax, 1, 'WHITESPACE', 2, 'COMMA')}"></td>
    </tr>
  </table>

  <div class="note-block">
    <p th:if="${order.incoterms != null}" class="incoterm-note"
       th:text="${order.incoterms + (order.incotermLocation != null ? ' - ' + order.incotermLocation : '')}"></p>
    <p th:if="${order.fiscalPosition != null}" class="note-line"
       th:text="${order.fiscalPosition.position}"></p>
    <div th:if="${not #lists.isEmpty(noteLines)}" style="margin-top: 10pt;">
      <p th:each="noteLine : ${noteLines}" class="note-line" th:text="${noteLine}"></p>
    </div>
    <div th:if="${not #lists.isEmpty(conditionLines)}" style="margin-top: 10pt;">
      <p th:each="conditionLine : ${conditionLines}" class="note-line" th:text="${conditionLine}"></p>
    </div>
    <div th:if="${not #lists.isEmpty(supplierNoteLines)}" style="margin-top: 10pt;">
      <p th:each="supplierNoteLine : ${supplierNoteLines}" class="note-line" th:text="${supplierNoteLine}"></p>
    </div>
  </div>

</body>
<div class="footer-block">
  <p>CoDIG - SAS au Capital de 50 000 € - RCS Strasbourg 450090436 Code NAF 519A</p>
  <p th:text="${'Mail: management@codig-sa.com, Phone: +33 3 88 25 65 70 - Web: http://codig-sa.com - TVA: ' + (ownCompany != null and ownCompany.vatNumber != null ? ownCompany.vatNumber : '')}"></p>
</div>
</html>
